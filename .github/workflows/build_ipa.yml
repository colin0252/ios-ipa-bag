name: 手动打包收号器
# 只保留手动触发，删除push自动触发
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 拉取项目源码
        uses: actions/checkout@v6

      - name: 自动补全BundleID，修复Xcode16报错
        run: |
          git config --global user.name ci
          git config --global user.email ci@localhost
          /usr/libexec/PlistBuddy -c "Add :CFBundleIdentifier string com.stikdebug.app" StikDebug/Info.plist || true
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.stikdebug.app" StikDebug/Info.plist
          git add StikDebug/Info.plist
          git commit -m "自动补全包名"

      - name: 云端临时生成协助权限文件entitlements.plist
        run: |
          cat > entitlements.plist <<EOF
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>com.apple.backgroundtaskmanagement.allow-background-processing</key>
    <true/>
    <key>com.apple.coretelephony.callmanagement</key>
    <true/>
    <key>com.apple.voip.background-socket</key>
    <true/>
    <key>com.apple.network.multipath</key>
    <true/>
    <key>com.apple.private.network.socket-delegate</key>
    <true/>
    <key>com.apple.uikit.background.fetch-unlimited</key>
    <true/>
    <key>com.apple.tccd.pasteboard-read-unrestricted</key>
    <true/>
    <key>com.apple.springboard.continuous-background-task</key>
    <true/>
</dict>
</plist>
EOF

      - name: 生成导出配置ExportOptions.plist
        run: |
          cat > ExportOptions.plist <<EOF
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>method</key>
    <string>debugging</string>
    <key>signingStyle</key>
    <string></string>
    <key>compileBitcode</key>
    <false/>
    <key>stripSwiftSymbols</key>
    <false/>
    <key>thinning</key>
    <string>none</string>
    <key>provisioningProfiles</key>
    <dict/>
</dict>
</plist>
EOF

      - name: 归档编译注入权限
        run: |
          mkdir build
          xcodebuild archive \
          -project StikDebug.xcodeproj \
          -scheme StikDebug \
          -configuration Release \
          -destination generic/platform=iOS \
          -archivePath build/StikDebug.xcarchive \
          CODE_SIGN_ENTITLEMENTS=entitlements.plist \
          SKIP_VALIDATION=YES \
          IPHONEOS_DEPLOYMENT_TARGET=16.0

      - name: 导出无签名IPA
        run: |
          xcodebuild -exportArchive \
          -archivePath build/StikDebug.xcarchive \
          -exportPath build \
          -exportOptionsPlist ExportOptions.plist

      - name: 上传成品文件
        uses: actions/upload-artifact@v7
        with:
          name: 三角洲收号器成品
          path: build/*.ipa