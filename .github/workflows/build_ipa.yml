name: Build Unsigned IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ensure Info.plist exists
        run: |
          PLIST_PATH="StikDebug/Info.plist"
          if [ ! -f "$PLIST_PATH" ] || ! grep -q "CFBundleIdentifier" "$PLIST_PATH"; then
            echo "Generating Info.plist..."
            cat > "$PLIST_PATH" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleIdentifier</key>
              <string>$(PRODUCT_BUNDLE_IDENTIFIER)</string>
              <key>CFBundleExecutable</key>
              <string>$(EXECUTABLE_NAME)</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UILaunchStoryboardName</key>
              <string>LaunchScreen</string>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
              </array>
          </dict>
          </plist>
          EOF
          fi

      - name: Archive
        run: |
          xcodebuild archive \
            -project StikDebug.xcodeproj \
            -scheme StikDebug \
            -archivePath build/StikDebug.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PRODUCT_BUNDLE_IDENTIFIER=com.stikdebug.app

      # 💡 手动打包 IPA（跳过 exportArchive，绝对可靠）
      - name: Package unsigned IPA
        run: |
          # 从 xcarchive 里提取 .app
          APP_PATH="build/StikDebug.xcarchive/Products/Applications/StikDebug.app"
          # 创建 Payload 目录并复制 .app
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          # 打包成 IPA（zip 格式）
          zip -r StikDebug.ipa Payload
          # 移到 build 目录以便上传
          mv StikDebug.ipa build/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: StikDebug-unsigned.ipa
          path: build/StikDebug.ipa