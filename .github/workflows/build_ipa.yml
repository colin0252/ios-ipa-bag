name: Build Unsigned IPA

on:
  workflow_dispatch:          # 手动触发

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🔧 自动修复 Info.plist（如果不存在或内容不完整）
      - name: Ensure Info.plist exists
        run: |
          PLIST_PATH="StikDebug/Info.plist"
          # 如果文件不存在，或其中没有 CFBundleIdentifier，就创建/覆盖
          if [ ! -f "$PLIST_PATH" ] || ! grep -q "CFBundleIdentifier" "$PLIST_PATH"; then
            echo "Generating Info.plist..."
            cat > "$PLIST_PATH" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleIdentifier</key>
              <string>$(PRODUCT_BUNDLE_IDENTIFIER)</string>
              <key>CFBundleExecutable</key>
              <string>$(EXECUTABLE_NAME)</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UILaunchStoryboardName</key>
              <string>LaunchScreen</string>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
              </array>
          </dict>
          </plist>
          EOF
          fi

      - name: Archive
        run: |
          xcodebuild archive \
            -project StikDebug.xcodeproj \
            -scheme StikDebug \
            -archivePath build/StikDebug.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PRODUCT_BUNDLE_IDENTIFIER=com.stikdebug.app

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath build/StikDebug.xcarchive \
            -exportPath build \
            -exportOptionsPlist Export.plist \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: StikDebug-unsigned.ipa
          path: build/*.ipa